<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style2.css" />
</head>
<body>
    <header>
        <nav>
          <div class="right">
            <ul>
              <li><a href="">Contact-me</a></li>
            </ul>
          </div>
        </nav>
    </header>
    <div class="main">
        <div class="contactform">
            <h1>
                Contact me for Work/Enquiry
            </h1>
            <div class="form1">
            <form>
                <div class="form-group">
                    <label for="clientemail">Name</label>
                    <input type="email" class="form-control" id="clientemail" aria-describedby="emailHelp" placeholder="Name">
                  </div>
                <div class="form-group">
                  <label for="clientemail">Email address</label>
                  <input type="email" class="form-control" id="clientemail" aria-describedby="emailHelp" placeholder="Enter email">
                  <small id="emailHelp" class="form-text"><br/>We'll never share your email with anyone else.</small>
                </div>
                <div class="form-group">
                  <label for="clientphone">Phone-no</label>
                  <input type="Phone-no" class="form-control" id="clientphone" placeholder="Phone-no">
                </div>
                <div id="form-check">
                  <input type="checkbox" id="form-check-input" id="isclient">
                  <label class="form-check-label" for="isclient">I want you to work on a project with me</label>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
              </form>
            </div>
        </div>
    </div>
</body>
</html>
